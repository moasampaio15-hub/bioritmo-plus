<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6366F1">
    <title>BIORITMO+</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/css/bioritmo-mobile.css">
</head>
<body>
    <div id="app">
        <!-- TELA DE LOGIN -->
        <div id="auth-screen" class="screen">
            <div class="app-content">
                <div class="text-center mb-2" style="padding:2rem 0;">
                    <div style="width:64px;height:64px;background:linear-gradient(135deg,#6366F1,#8B5CF6);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;color:white;font-size:1.75rem;"><i class="fas fa-heartbeat"></i></div>
                    <h1 style="font-size:1.5rem;font-weight:700;">BIORITMO+</h1>
                    <p style="color:var(--text-secondary);font-size:0.875rem;">by Sampaio Diagnóstico</p>
                </div>
                
                <div class="card">
                    <form id="login-form">
                        <input type="email" id="login-email" placeholder="Email" required>
                        <input type="password" id="login-senha" placeholder="Senha" required>
                        <button type="submit" class="btn">Entrar</button>
                    </form>
                    <hr style="border:none;border-top:1px solid var(--border);margin:1.5rem 0;">
                    <form id="register-form">
                        <input type="text" id="reg-nome" placeholder="Nome completo" required>
                        <input type="email" id="reg-email" placeholder="Email" required>
                        <input type="password" id="reg-senha" placeholder="Senha" required>
                        <button type="submit" class="btn" style="background:var(--success);">Criar conta</button>
                    </form>
                </div>
            </div>
        </div>
        
        <!-- TELA PRINCIPAL -->
        <div id="main-screen" class="screen">
            <div class="app-header">
                <h1>BIORITMO+</h1>
                <button onclick="logout()" style="background:none;border:none;color:var(--text-secondary);"><i class="fas fa-sign-out-alt"></i></button>
            </div>
            
            <div class="app-content" id="main-content">
                <!-- HOME -->
                <div id="page-home">
                    <div id="home-content"></div>
                </div>
                
                <!-- CHECKIN -->
                <div id="page-checkin" class="hidden">
                    <div id="checkin-content"></div>
                </div>
                
                <!-- DASHBOARD -->
                <div id="page-dashboard" class="hidden">
                    <div id="dashboard-content"></div>
                </div>
            </div>
            
            <div class="bottom-nav">
                <button class="nav-item active" data-page="home" onclick="showPage('home')">
                    <i class="fas fa-home"></i>Início
                </button>
                <button class="nav-item" data-page="checkin" onclick="showPage('checkin')">
                    <i class="fas fa-plus-circle"></i>Check-in
                </button>
                <button class="nav-item" data-page="dashboard" onclick="showPage('dashboard')">
                    <i class="fas fa-chart-line"></i>Gráficos
                </button>
            </div>
        </div>
    </div>
    
    <script src="/js/bioritmo-mobile.js"></script>
    <script>
        function showPage(page) {
            // Esconder todas as páginas
            document.getElementById('page-home').classList.add('hidden');
            document.getElementById('page-checkin').classList.add('hidden');
            document.getElementById('page-dashboard').classList.add('hidden');
            
            // Mostrar página selecionada
            document.getElementById('page-' + page).classList.remove('hidden');
            
            // Atualizar nav
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelector('[data-page="' + page + '"]').classList.add('active');
            
            // Carregar conteúdo
            if (page === 'home') loadHome();
            if (page === 'checkin') loadCheckin();
            if (page === 'dashboard') loadDashboard();
            
            // Scroll topo
            document.querySelector('.app-content').scrollTop = 0;
        }
    </script>
</body>
</html>
