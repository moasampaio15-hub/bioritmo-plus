services:
  - type: web
    name: bioritmo-plus
    runtime: bun
    buildCommand: bun install
    startCommand: bun server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
    disk:
      name: bioritmo-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
